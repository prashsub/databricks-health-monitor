# Alerting Setup Orchestrator Job (Composite)
# ============================================
#
# Composite job that orchestrates the complete alerting layer setup
# by referencing atomic jobs via run_job_task (no direct notebook calls).
#
# Sequence:
#   1. Create alerting tables
#   2. Seed rule-based alerts + ML alerts (parallel)
#   3. Sync notification destinations (parallel with seeds)
#   4. Validate all alert queries (after both seeds complete)
#   5. Deploy SQL alerts (after validation + notifications)
#
# This job should be run once to set up the alerting framework, then re-run
# when alert configurations change.
#
# Usage:
#   databricks bundle run -t dev alerting_setup_orchestrator_job

resources:
  jobs:
    alerting_setup_orchestrator_job:
      name: "[${bundle.target}] Health Monitor - Alerting Setup Orchestrator"
      description: >
        Composite job: Orchestrates complete alerting framework setup.
        Sequence: Tables -> Seed (rule + ML) + Notifications -> Validation -> Deploy.
        References atomic jobs via run_job_task (no direct notebook calls).

      tasks:
        # Step 1: Create/verify alerting tables
        - task_key: setup_tables
          run_job_task:
            job_id: ${resources.jobs.alerting_tables_job.id}

        # Step 2a: Seed rule-based alert configurations (after tables exist)
        - task_key: seed_alerts
          depends_on:
            - task_key: setup_tables
          run_job_task:
            job_id: ${resources.jobs.alerting_seed_job.id}

        # Step 2b: Seed ML-driven alert configurations (after tables exist)
        - task_key: seed_ml_alerts
          depends_on:
            - task_key: setup_tables
          run_job_task:
            job_id: ${resources.jobs.alerting_ml_seed_job.id}

        # Step 3: Sync notification destinations (parallel with seeds)
        - task_key: sync_notifications
          depends_on:
            - task_key: setup_tables
          run_job_task:
            job_id: ${resources.jobs.alerting_notifications_job.id}

        # Step 4: Validate all alert queries (after both seeds complete)
        - task_key: validate_queries
          depends_on:
            - task_key: seed_alerts
            - task_key: seed_ml_alerts
          run_job_task:
            job_id: ${resources.jobs.alerting_validation_job.id}

        # Step 5: Deploy SQL alerts (after validation + notifications)
        - task_key: deploy_alerts
          depends_on:
            - task_key: validate_queries
            - task_key: sync_notifications
          run_job_task:
            job_id: ${resources.jobs.alerting_deploy_job.id}

      email_notifications:
        on_failure:
          - data-engineering@company.com
        on_success:
          - data-engineering@company.com

      tags:
        environment: ${bundle.target}
        project: health_monitor
        layer: alerting
        job_type: orchestrator
        job_level: composite
        compute_type: serverless
